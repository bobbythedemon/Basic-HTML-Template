<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template - Documentation</title>
    <style>
        :root {
            --bg-sidebar: #f8f9fa;
            --border-color: #ced4da;
            --link-blue: #007bff;
            --text-dark: #212529;
            --text-muted: #6c757d;
            --header-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --btn-grey: #6c757d;    
            --sidebar-accent: #adb5bd; /* The new grey for the box border */
        }

        body {
            font-family: var(--header-font);
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: var(--text-dark);
            line-height: 1.6;
            font-size: 14px;
        }

        /* Top Navigation Header */
        header {
            background-color: #f8f9fa;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            height: 60px;
            padding: 0 20px;
        }

        .brand {
            font-weight: 800;
            color: #1a1a1a;
            font-size: 24px;
            letter-spacing: -1px;
        }

        /* Main Layout */
        .wrapper {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Navigation Sidebar */
        aside {
            width: 220px;
            padding: 30px 20px;
            border-right: 1px solid #eeeeee;
        }

        .nav-box {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-left: 3px solid var(--sidebar-accent); /* Changed from blue to grey */
            padding: 15px;
            border-radius: 0;
        }

        .nav-box h4 {
            margin: 0 0 12px 0;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn {
            display: block;
            color: white !important;
            text-align: center;
            text-decoration: none;
            padding: 10px;
            border-radius: 0;
            font-weight: 600;
            font-size: 13px;
            transition: opacity 0.2s;
            margin-bottom: 10px;
        }

        .btn:hover {
            opacity: 0.8;
            text-decoration: none !important;
        }

        .btn-grey { background-color: var(--btn-grey); }

        /* Content Area */
        main {
            flex: 1;
            padding: 40px 60px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: #212529;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 30px;
        }

        p {
            margin-bottom: 1.5em;
            color: #444;
            max-width: 850px;
        }

        .footer-note {
            margin-top: 50px;
            font-style: italic;
            color: var(--text-muted);
            font-size: 12px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .cta-container {
            max-width: 300px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<header>
    <div class="brand">Name</div>
</header>

<div class="wrapper">
    <aside>
        <div class="nav-box">
            <h4>Navigation</h4>
            <a href="#" class="btn btn-grey">
                Button
            </a>
        </div>
    </aside>

    <main id="main-content">
        <div id="page-home" class="content-page">
            <h1>Name</h1>
            <div class="subtitle">Subtitle/Tagline</div>
            
            <p>Put your description here.</p>

            <div class="cta-container">
                <a href="#" class="btn btn-grey">
                    Button
                </a>
            </div>

            <div class="footer-note">
                <p>Credits/Footnote here</p>
            </div>
        </div>
    </main>
</div>

</body>
</html>
